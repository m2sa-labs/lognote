const userColors = {
  "ママ": "#ffb6c1",
  "結菜": "#ffd966",
  "洸希": "#a4c2f4",
  "パパ": "#b6d7a8",

};
function getIcon(name) {
  if (name.includes("生理")) return "🌙 ";
  if (name.includes("歯科矯正")) return "😁 ";
  if (name.includes("美容医療")) return "✨ ";

  if (name.includes("美容")) return "💇‍♀️ ";
  if (name.includes("歯")) return "🦷 ";
  if (name.includes("病")) return "🏥 ";
  if (name.includes("薬")) return "💊 ";

  if (name.includes("ネイル")) return "💅 ";
  if (name.includes("健康")) return "🧾 ";
  if (name.includes("運動")) return "🏃 ";
  if (name.includes("ワクチン")) return "💉 ";
  if (name.includes("トリミ")) return "✂️ ";
  if (name.includes("イベント")) return "🎉 ";
  if (name.includes("旅行")) return "✈️ ";

  if (name.includes("体調")) return "🌡️ ";
  if (name.includes("脱毛")) return "🪒 ";
  if (name.includes("車検")) return "🚗 ";
  if (name.includes("携帯機種変")) return "📱 ";
  if (name.includes("家電購入")) return "🛍️ ";
  if (name.includes("化粧品")) return "💄 ";
  if (name.includes("大掃除")) return "🧹 ";
  if (name.includes("お祝い")) return "🎊 ";
  if (name.includes("LIVE")) return "🎤 ";
  if (name.includes("誕生日")) return "🎂 ";
  if (name.includes("クリスマス")) return "🎄 ";
  if (name.includes("読書")) return "📚 ";
  if (name.includes("ジム")) return "🏋️ ";
  if (name.includes("筋トレ")) return "💪 ";
  if (name.includes("サウナ")) return "♨️ ";
  if (name.includes("外食")) return "🍽️ ";

  return "⭐ ";
}
  let users =
JSON.parse(localStorage.getItem("users")) || [];


let currentUser =
  localStorage.getItem("currentUser") ||
  (users.length > 0 ? users[0].name : null);
if (!currentUser) {

  document.getElementById("setupScreen").style.display = "block";
  document.getElementById("appScreen").style.display = "none";

}

   let userItems =
JSON.parse(localStorage.getItem("userItems")) || {};

function renderButtons() {
  const area = document.getElementById("buttonArea");
  area.innerHTML = "";

  const items = userItems[currentUser] || [];

  items.forEach(item => {
    const btn = document.createElement("button");
    btn.innerHTML =
      "<span style='font-size:18px'>" + getIcon(item) + "</span> " +
      "<span>" + item + "</span>";

    btn.draggable = true;
    btn.dataset.item = item;

    let pressTimer;
    let longPress = false;
    let touched = false;

    btn.addEventListener("touchstart", () => {
      touched = true;
      longPress = false;

      pressTimer = setTimeout(() => {
        longPress = true;
        openItemMenu(item);
      }, 700);
    });

    btn.addEventListener("touchend", (e) => {
      clearTimeout(pressTimer);

      if (longPress) {
        e.preventDefault();
        return;
      }

      e.preventDefault();
      addLog(item);
    });

    btn.addEventListener("touchmove", () => {
      clearTimeout(pressTimer);
    });

    btn.addEventListener("touchcancel", () => {
      clearTimeout(pressTimer);
    });

    btn.addEventListener("click", (e) => {
      if (touched) {
        touched = false;
        e.preventDefault();
        return;
      }
      addLog(item);
    });

    area.appendChild(btn);
  });
}
document.addEventListener("click", function(e) {

  const menu = document.getElementById("itemMenu");

  if (!menu.contains(e.target)) {
    closeMenu();
  }

});
function changeUser(name, element) {
  currentUser = name;
 localStorage.setItem("currentUser", name); // ←追加
  document.body.className = "";

  const user = users.find(u => u.name === name);
  if (user) {
    document.body.classList.add(user.color);
  }

  document.querySelectorAll(".user").forEach(el => {
    el.classList.remove("active");
  });

  if (element) {
    element.classList.add("active");
  }

  document.getElementById("currentUserDisplay").textContent =
    "🌿 " + name + " の記録";

  renderLogs();
  renderButtons();
}
  const logList = document.getElementById("logList");
  let logs = JSON.parse(localStorage.getItem("lifeLogs")) || [];
let openedType = null;

 function renderLogs() {
  logList.innerHTML = "";

  let grouped = {};

  logs.forEach((log, index) => {
    if (log.user !== currentUser) return;

    if (!grouped[log.type]) {
      grouped[log.type] = [];
    }

    grouped[log.type].push({ ...log, index });
  });
const sortedTypes = Object.keys(grouped).sort((a, b) => {
  const dateA = new Date(grouped[a][0].date);
  const dateB = new Date(grouped[b][0].date);
  return dateB - dateA;
});
  sortedTypes.forEach(type => {
    const items = grouped[type];

    items.sort((a, b) => new Date(b.date) - new Date(a.date));

    const latest = items[0];

    const li = document.createElement("li");
    li.style.cursor = "pointer";

    const today = new Date(latest.date);

let daysText = "";

if (items.length > 1) {
  const prev = new Date(items[1].date);
  const diff =
    Math.floor((today - prev) / (1000 * 60 * 60 * 24));

  daysText = " 🕒 前回から " + diff + "日";
}

const todayStr = new Date().toISOString().split("T")[0];

const displayDate =
  latest.date === todayStr ? "今日" : latest.date;

li.innerHTML =
  "<span class='logName'>" +
  getIcon(latest.type) + latest.type +
  "</span>" +

  "<span class='logDate'>" +
  displayDate +
  daysText +
  "</span>";
    li.onclick = function () {
      if (li.dataset.open === "true") {
        renderLogs();
        return;
      }

      li.dataset.open = "true";
      openedType = type;
li.style.display = "block";
li.innerHTML = "<strong>" + type + " の履歴</strong><br><br>";

     
      items.forEach((item, i) => {

  let daysText = "";

  if (item.type === "生理" && i < items.length - 1) {

    const current = new Date(item.date);
    const prev = new Date(items[i + 1].date);

    const diff = Math.floor(
      (current - prev) / (1000 * 60 * 60 * 24)
    );

    daysText = " 🕒 前回から " + diff + "日";
  }

  li.innerHTML +=
  "<div class='history-row'>" +
  "<span>📅 " + item.date + (item.memo ? "（" + item.memo + "）" : "") + daysText + "</span>" +
  "<span class='delete-btn' onclick='event.stopPropagation(); deleteLog(" + item.index + ")'>🗑</span>" +
  "</div>";
});
    }

    logList.appendChild(li);
});
}
document
  .getElementById("newItem")
  .addEventListener("keypress", function(e){
    if(e.key === "Enter"){
      addNewItem();
    }
});

function addLog(type) {

  let selectedDate =
  document.getElementById("logDateText").value ||
  document.getElementById("logDate").value;

  if (/^\d{8}$/.test(selectedDate)) {
    selectedDate =
      selectedDate.slice(0,4) + "-" +
      selectedDate.slice(4,6) + "-" +
      selectedDate.slice(6,8);
  }

  const date = selectedDate
    ? new Date(selectedDate).toISOString().split("T")[0]
    : new Date().toISOString().split("T")[0];

  const user = currentUser;
  const memo = document.getElementById("memoInput").value;

  const newLog = {
    user: user,
    type: type,
    date: date,
    memo: memo
  };

  logs.push(newLog);
  localStorage.setItem("lifeLogs", JSON.stringify(logs));
  renderLogs();
document.getElementById("memoInput").value = "";
document.getElementById("logDateText").value = "";
document.getElementById("logDate").valueAsDate = new Date();
 
}
function addNewItem() {

  const input = document.getElementById("newItem");
  const value = input.value.trim();

  if (value === "") return;

  if (!userItems[currentUser]) {
    userItems[currentUser] = [];
  }

  userItems[currentUser].push(value);

  localStorage.setItem(
    "userItems",
    JSON.stringify(userItems)
  );

  renderButtons();

  input.value = "";
}
  renderLogs();
 
 function deleteLog(index) {
  logs.splice(index, 1);
  localStorage.setItem("lifeLogs", JSON.stringify(logs));

  const reopen = openedType;  // 覚えておく
  renderLogs();

  // 再度開く
  if (reopen) {
    const listItems = document.querySelectorAll("#logList li");
    listItems.forEach(li => {
      if (li.textContent.includes(reopen)) {
        li.click();
      }
    });
  }
}
document.getElementById("currentUserDisplay").textContent =
  "🌿 " + currentUser + " の記録";

async function backupData() {
  const data = {
    users: users,
    currentUser: currentUser,
    logs: logs,
    userItems: userItems
  };

  const dataStr = JSON.stringify(data, null, 2);
  const fileName = "lognote-backup.json";

  const blob = new Blob([dataStr], { type: "application/json" });
  const file = new File([blob], fileName, { type: "application/json" });

  // iPhone / Safari 対応：共有シートで保存
  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        title: "LogNote バックアップ",
        text: "LogNoteのバックアップです",
        files: [file]
      });
      return;
    } catch (err) {
      console.log("共有キャンセルまたは失敗", err);

      // キャンセルならそのまま終了
      if (err.name === "AbortError") {
        return;
      }

      // それ以外の失敗は、下の通常保存へ進む
    }
  }

  // PCなどの通常ダウンロード
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  a.remove();

  setTimeout(() => {
    URL.revokeObjectURL(url);
  }, 1000);
}

function loadBackup() {
  const fileInput = document.getElementById("backupFile");
  fileInput.value = "";
  fileInput.click();

  fileInput.onchange = function () {
    const file = fileInput.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (e) {
      try {
        const data = JSON.parse(e.target.result);

        if (confirm("バックアップを復元しますか？")) {
          logs = data.logs || [];
          userItems = data.userItems || {};
          users = data.users || users;
          currentUser = data.currentUser || (users[0] ? users[0].name : null);

          localStorage.setItem("lifeLogs", JSON.stringify(logs));
          localStorage.setItem("userItems", JSON.stringify(userItems));
          localStorage.setItem("users", JSON.stringify(users));
          localStorage.setItem("currentUser", currentUser || "");

          renderUsers();
          changeUser(currentUser);
          renderLogs();
          renderButtons();

          alert("バックアップを復元しました");
        }
      } catch (error) {
        alert("バックアップファイルの読み込みに失敗しました");
        console.log(error);
      }
    };

    reader.readAsText(file);
  };
}
function renderUsers() {
  const userArea = document.getElementById("userList");
  if (!userArea) return;

  userArea.innerHTML = "";

  users.forEach((user) => {
    const div = document.createElement("div");
    div.className = "user";

    if (user.name === currentUser) {
      div.classList.add("active");
    }

    div.innerHTML = user.icon + "<span>" + user.name + "</span>";

    let pressTimer = null;
    let isLongPress = false;

    // タップ
    div.addEventListener("click", (e) => {
      if (isLongPress) {
        e.preventDefault();
        isLongPress = false;
        return;
      }
      changeUser(user.name, div);
    });

    // 長押し開始
    div.addEventListener("touchstart", () => {
      isLongPress = false;

      pressTimer = setTimeout(() => {
        isLongPress = true;

        if (user.name === "共通") return;

        if (confirm(user.name + " を削除する？")) {
          users = users.filter(u => u.name !== user.name);

          if (currentUser === user.name) {
            currentUser = users.length > 0 ? users[0].name : null;
            localStorage.setItem("currentUser", currentUser);
          }

          localStorage.setItem("users", JSON.stringify(users));
          renderUsers();
          renderButtons();
        }
      }, 700);
    });

    // 長押し終了
    div.addEventListener("touchend", () => {
      clearTimeout(pressTimer);
    });

    // 指が動いたらキャンセル
    div.addEventListener("touchmove", () => {
      clearTimeout(pressTimer);
    });

    // 中断時もキャンセル
    div.addEventListener("touchcancel", () => {
      clearTimeout(pressTimer);
    });

    userArea.appendChild(div);
  });
}

}

}
 function renameItem(){

  const newName = prompt("新しい名前");

  if(!newName) return;

  userItems[currentUser] =
    userItems[currentUser].map(i =>
      i === selectedItem ? newName : i
    );

  localStorage.setItem(
    "userItems",
    JSON.stringify(userItems)
  );

  closeMenu();
  renderButtons();
}
function deleteItem(){

  if(!confirm(selectedItem + " を削除する？"))
    return;

  userItems[currentUser] =
    userItems[currentUser].filter(
      i => i !== selectedItem
    );

  localStorage.setItem(
    "userItems",
    JSON.stringify(userItems)
  );

  closeMenu();
  renderButtons();
}
function startApp() {

  const name =
    document.getElementById("firstUserName").value.trim();

if (!firstSelectedIcon) {
  alert("アイコンを選んでください");
  return;
}

  if (!name) {
    alert("名前を入れてください");
    return;
  }

  users = [
  {

  },
  {
    name: "共通",
     icon: "🌟",
    color: "common"
  }
];

  localStorage.setItem(
    "users",

  );

  );

  document.getElementById("appScreen").style.display = "block";

 if (!localStorage.getItem("users")) {

} else {

  document.getElementById("setupScreen").style.display = "none";

}
}
let selectedIcon = "👩";

}

function closeUserModal() {

}
function selectIcon(element, icon) {
  selectedIcon = icon;

  const icons = document.querySelectorAll("#iconSelect span");

  icons.forEach(el => {
    el.classList.remove("icon-selected");
  });

  element.classList.add("icon-selected");

function autoColor(icon) {

  const colorMap = {
    "👩": "pink",
    "👨": "blue",
    "👧": "rose",
    "👦": "sky",
    "👶": "yellow",

    "🐶": "green",
    "🐱": "purple",
    "🐾": "mint",

    "🌸": "sakura",
    "🌼": "flower",

    "🧸": "brown"
  };

  return colorMap[icon] || "common";
}

function addFamilyUser() {

  const name =
    document.getElementById("newUserName").value.trim();

  if (!name) {
    alert("名前を入れてね");
    return;
  }

  // 共通を一回取り出す
const commonUser = users.find(
  user => user.name === "共通"
);

// 共通を消す
users = users.filter(
  user => user.name !== "共通"
);

// 新しい家族追加
users.push({
  name: name,
  icon: selectedIcon,
  color: autoColor(selectedIcon)
});
// 最後に共通を戻す
users.push(commonUser);
    
  localStorage.setItem(
    "users",
    JSON.stringify(users)
  );

  closeUserModal();

  renderUsers();
}
if (!localStorage.getItem("users")) {

  document.getElementById("setupScreen").style.display = "block";
  document.getElementById("appScreen").style.display = "none";

} else {

  document.getElementById("setupScreen").style.display = "none";
  document.getElementById("appScreen").style.display = "block";

  renderUsers();
  changeUser(currentUser);
}
