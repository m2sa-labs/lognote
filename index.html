<div class="card">
  <div id="setupScreen" style="display:none; text-align:center;">

>

<!-- ✅① 記録ボタン -->
<h3>➕ 記録する</h3>
<div id="buttonArea"></div>

<!-- ✅② メモ -->

<!-- ✅⑤ 項目管理 -->

    <div>📖</div>

<script>
  function scrollToRecord() {
  document.getElementById("buttonArea")
    .scrollIntoView({ behavior: "smooth" });
}

function scrollToLogs() {
  document.getElementById("logList")
    .scrollIntoView({ behavior: "smooth" });
}

function scrollToSettings() {
  document.getElementById("newItem")
    .scrollIntoView({ behavior: "smooth" });
}
window.addEventListener("load", function() {
  document.getElementById("logDate").valueAsDate = new Date();
});
const userColors = {
  "ママ": "#ffb6c1",
  "結菜": "#ffd966",
  "洸希": "#a4c2f4",
  "パパ": "#b6d7a8",
  "共通": "#dddddd"
};
function getIcon(name) {
  if (name.includes("美容")) return "💇‍♀️ ";
  if (name.includes("歯")) return "🦷 ";
  if (name.includes("病")) return "🏥 ";
  if (name.includes("薬")) return "💊 ";

  if (name.includes("ネイル")) return "💅 ";
  if (name.includes("健康")) return "🧾 ";
  if (name.includes("運動")) return "🏃 ";
  if (name.includes("ワクチン")) return "💉 ";
  if (name.includes("トリミ")) return "✂️ ";
  if (name.includes("イベント")) return "🎉 ";
  if (name.includes("旅行")) return "✈️ ";

  return "📌 ";
}
  let users =
JSON.parse(localStorage.getItem("users")) || [];


let currentUser =
  localStorage.getItem("currentUser") ||
  (users.length > 0 ? users[0].name : null);
if (!currentUser) {

  document.getElementById("setupScreen").style.display = "block";
  document.getElementById("appScreen").style.display = "none";

}

   let userItems =
JSON.parse(localStorage.getItem("userItems")) || {};

function renderButtons() {

  const area = document.getElementById("buttonArea");
  area.innerHTML = "";

  const items = userItems[currentUser] || [];

  items.forEach(item => {

    const btn = document.createElement("button");
    btn.textContent = getIcon(item) + item;
   btn.draggable = true;
btn.dataset.item = item;

   let pressTimer;
let longPress = false;

btn.addEventListener("touchstart", () => {

  longPress = false;

  pressTimer = setTimeout(() => {
    longPress = true;
    openItemMenu(item);
  }, 700);

});

btn.addEventListener("touchend", (e) => {

  clearTimeout(pressTimer);

  // 長押し成功したら記録しない
  if (longPress) {
    e.preventDefault();
    return;
  }

  addLog(item);

});

// ⭐PC用クリック
btn.addEventListener("click", () => {
  addLog(item);
});

btn.addEventListener("touchmove", () => {
  clearTimeout(pressTimer);
});

    area.appendChild(btn);

  });
document.addEventListener("click", function(e) {

  const menu = document.getElementById("itemMenu");

  if (!menu.contains(e.target)) {
    closeMenu();
  }

});
}
function changeUser(name, element) {
  currentUser = name;
 localStorage.setItem("currentUser", name); // ←追加
  document.body.className = "";

  const user = users.find(u => u.name === name);
  if (user) {
    document.body.classList.add(user.color);
  }

  document.querySelectorAll(".user").forEach(el => {
    el.classList.remove("active");
  });

  if (element) {
    element.classList.add("active");
  }

  document.getElementById("currentUserDisplay").textContent =
    "🌿 " + name + " の記録";

  renderLogs();
  renderButtons();
}
  const logList = document.getElementById("logList");
  let logs = JSON.parse(localStorage.getItem("lifeLogs")) || [];
let openedType = null;

 function renderLogs() {
  logList.innerHTML = "";

  let grouped = {};

  logs.forEach((log, index) => {
    if (log.user !== currentUser) return;

    if (!grouped[log.type]) {
      grouped[log.type] = [];
    }

    grouped[log.type].push({ ...log, index });
  });

  for (let type in grouped) {
    const items = grouped[type];

    items.sort((a, b) => new Date(b.date) - new Date(a.date));

    const latest = items[0];

    const li = document.createElement("li");
    li.style.cursor = "pointer";

    const today = new Date(latest.date);

let daysText = "";

if (items.length > 1) {
  const prev = new Date(items[1].date);
  const diff =
    Math.floor((today - prev) / (1000 * 60 * 60 * 24));

  daysText = " 🕒 前回から " + diff + "日";
}

const todayStr = new Date().toISOString().split("T")[0];

const displayDate =
  latest.date === todayStr ? "今日" : latest.date;

li.textContent =
  displayDate +
  " - " +
  latest.type +
  (latest.memo ? "（" + latest.memo + "）" : "") +
  daysText;
    li.onclick = function () {
      if (li.dataset.open === "true") {
        renderLogs();
        return;
      }

      li.dataset.open = "true";
      openedType = type;
li.style.display = "block";
li.innerHTML = "<strong>" + type + " の履歴</strong><br><br>";

     
      items.forEach((item, i) => {

  let daysText = "";

  if (item.type === "生理" && i < items.length - 1) {

    const current = new Date(item.date);
    const prev = new Date(items[i + 1].date);

    const diff = Math.floor(
      (current - prev) / (1000 * 60 * 60 * 24)
    );

    daysText = " 🕒 前回から " + diff + "日";
  }

  li.innerHTML +=
    item.date +
    (item.memo ? "（" + item.memo + "）" : "") +
    daysText +
    ' <span class="delete-btn" onclick="event.stopPropagation(); deleteLog(' + item.index + ')">🗑</span><br>';
});
    }; 

    logList.appendChild(li);
  }
}

function addLog(type) {

  const selectedDate = document.getElementById("logDate").value;
  const date =
  selectedDate ||
  new Date().toISOString().split("T")[0];

  const user = currentUser;
  const memo = document.getElementById("memoInput").value;

  const newLog = {
    user: user,
    type: type,
    date: date,
    memo: memo
  };

  logs.push(newLog);
  localStorage.setItem("lifeLogs", JSON.stringify(logs));
  renderLogs();

  document.getElementById("memoInput").value = "";

  // ⭐追加
  document.getElementById("logDate").valueAsDate = new Date();
}
function addNewItem() {

  const input = document.getElementById("newItem");
  const value = input.value.trim();

  if (value === "") return;

  if (!userItems[currentUser]) {
    userItems[currentUser] = [];
  }

  userItems[currentUser].push(value);

  localStorage.setItem(
    "userItems",
    JSON.stringify(userItems)
  );

  renderButtons();

  input.value = "";
}
  renderLogs();
 
 function deleteLog(index) {
  logs.splice(index, 1);
  localStorage.setItem("lifeLogs", JSON.stringify(logs));

  const reopen = openedType;  // 覚えておく
  renderLogs();

  // 再度開く
  if (reopen) {
    const listItems = document.querySelectorAll("#logList li");
    listItems.forEach(li => {
      if (li.textContent.includes(reopen)) {
        li.click();
      }
    });
  }
}
document.getElementById("currentUserDisplay").textContent =
  "🌿 " + currentUser + " の記録";

 function backupData() {

  const data = {
    logs: logs,
    userItems: userItems
  };

  const dataStr =
    JSON.stringify(data, null, 2);

  const blob =
    new Blob([dataStr], { type: "application/json" });

  const url =
    URL.createObjectURL(blob);

  const a = document.createElement("a");

  a.href = url;
  a.download = "lognote-backup.json";
  a.click();

  URL.revokeObjectURL(url);
}
renderButtons();

function loadBackup() {

  const fileInput =
    document.getElementById("backupFile");

  fileInput.click();

  fileInput.onchange = function () {

    const file = fileInput.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (e) {

      const data = JSON.parse(e.target.result);

      if (confirm("バックアップを復元しますか？")) {

        logs = data.logs || [];
userItems = data.userItems || {};

localStorage.setItem(
  "userItems",
  JSON.stringify(userItems)
);

        localStorage.setItem(
          "lifeLogs",
          JSON.stringify(logs)
        );

        renderLogs();
        renderButtons(); 
      }
    };

    reader.readAsText(file);
  };
}
function renderUsers() {
  const userArea = document.getElementById("userList");
  if (!userArea) return;

  userArea.innerHTML = "";

  users.forEach((user, index) => {

    const div = document.createElement("div");
    div.className = "user";

    if (user.name === currentUser) {
  div.classList.add("active");
}

    div.innerHTML =
      user.icon + "<span>" + user.name + "</span>";

    div.onclick = () => changeUser(user.name, div);
let pressTimer;

div.addEventListener("touchstart", () => {

  pressTimer = setTimeout(() => {

    if (user.name === "共通") return;

    if (confirm(user.name + " を削除する？")) {

      users = users.filter(u => u.name !== user.name);

      // ⭐ 今のユーザーだったら変更
      if (currentUser === user.name) {
        currentUser = users.length > 0 ? users[0].name : null;
        localStorage.setItem("currentUser", currentUser);
      }

      localStorage.setItem("users", JSON.stringify(users));

      renderUsers();
      renderButtons();

    }

  }, 700);

});

div.addEventListener("touchend", () => {
  clearTimeout(pressTimer);
});
    userArea.appendChild(div);
  });
}
renderUsers();

if (currentUser) {
  changeUser(currentUser);
}


let firstSelectedIcon = null;

function selectFirstIcon(element, icon) {
  firstSelectedIcon = icon;

  const icons = document.querySelectorAll("#firstIconSelect span");

  icons.forEach(el => {
    el.classList.remove("icon-selected");
  });

  element.classList.add("icon-selected");
}
let selectedItem = null;

function openItemMenu(item){
  selectedItem = item;
  document.getElementById("itemMenu").classList.add("show");
}

function closeMenu(){
  document.getElementById("itemMenu").classList.remove("show");
}
 function renameItem(){

  const newName = prompt("新しい名前");

  if(!newName) return;

  userItems[currentUser] =
    userItems[currentUser].map(i =>
      i === selectedItem ? newName : i
    );

  localStorage.setItem(
    "userItems",
    JSON.stringify(userItems)
  );

  closeMenu();
  renderButtons();
}
function deleteItem(){

  if(!confirm(selectedItem + " を削除する？"))
    return;

  userItems[currentUser] =
    userItems[currentUser].filter(
      i => i !== selectedItem
    );

  localStorage.setItem(
    "userItems",
    JSON.stringify(userItems)
  );

  closeMenu();
  renderButtons();
}
function startApp() {

  const name =
    document.getElementById("firstUserName").value.trim();

if (!firstSelectedIcon) {
  alert("アイコンを選んでください");
  return;
}

  if (!name) {
    alert("名前を入れてください");
    return;
  }

  users = [
  {
    name: name,
    icon: firstSelectedIcon,
    color: autoColor(name, firstSelectedIcon)
  },
  {
    name: "共通",
     icon: "🌟",
    color: "common"
  }
];

  localStorage.setItem(
    "users",
    JSON.stringify(users)
  );

  // ⭐追加（超重要）
  localStorage.setItem(
    "currentUser",
    name
  );

  currentUser = name;

  document.getElementById("setupScreen").style.display = "none";
  document.getElementById("appScreen").style.display = "block";

 if (!localStorage.getItem("users")) {

  document.getElementById("setupScreen").style.display = "block";
  document.getElementById("appScreen").style.display = "none";

} else {

  document.getElementById("setupScreen").style.display = "none";
  document.getElementById("appScreen").style.display = "block";

  renderUsers();
  changeUser(currentUser);
}
}
let selectedIcon = "👩";

function openUserModal() {
  document.getElementById("userModal").style.display = "flex";
}

function closeUserModal() {
  document.getElementById("userModal").style.display = "none";
}
function selectIcon(element, icon) {
  selectedIcon = icon;

  const icons = document.querySelectorAll("#iconSelect span");

  icons.forEach(el => {
    el.classList.remove("icon-selected");
  });

  element.classList.add("icon-selected");
}

function autoColor(icon) {

  const colorMap = {
    "👩": "pink",
    "👨": "blue",
    "👧": "rose",
    "👦": "sky",
    "👶": "yellow",

    "🐶": "green",
    "🐱": "purple",
    "🐾": "mint",

    "🌸": "sakura",
    "🌼": "flower",

    "🧸": "brown"
  };

  return colorMap[icon] || "common";
}

function addFamilyUser() {

  const name =
    document.getElementById("newUserName").value.trim();

  if (!name) {
    alert("名前を入れてね");
    return;
  }

  // 共通を一回取り出す
const commonUser = users.find(
  user => user.name === "共通"
);

// 共通を消す
users = users.filter(
  user => user.name !== "共通"
);

// 新しい家族追加
users.push({
  name: name,
  icon: selectedIcon,
  color: autoColor(selectedIcon)
});
// 最後に共通を戻す
users.push(commonUser);
    
  localStorage.setItem(
    "users",
    JSON.stringify(users)
  );

  closeUserModal();

  renderUsers();
}
if (!localStorage.getItem("users")) {

  document.getElementById("setupScreen").style.display = "block";
  document.getElementById("appScreen").style.display = "none";

} else {

  document.getElementById("setupScreen").style.display = "none";
  document.getElementById("appScreen").style.display = "block";

  renderUsers();
  changeUser(currentUser);
}
